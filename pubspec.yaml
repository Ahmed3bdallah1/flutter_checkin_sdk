name: flutter_checkin_sdk
description: Production plugin wrapping the Checkin.com (GetID) native SDK for Android and iOS.
version: 0.1.3
homepage: https://dev.checkin.com/docs/overview
repository: https://github.com/Ahmed3bdallah1/flutter_checkin_sdk/
license: MIT

environment:
  sdk: '>=3.7.2 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.checkin.flutter_checkin_sdk
        pluginClass: FlutterCheckinSdkPlugin
      ios:
        pluginClass: FlutterCheckinSdkPlugin
